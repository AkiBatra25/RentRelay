syntax = "proto3";

// ─────────────────────────────────────────────────────────────────────────────
// RentRelay — Proto Definitions
// All 8 microservices: User, Landlord, Tenant, Matching,
// Agreement (Escrow), Notification, Document, Property
// ─────────────────────────────────────────────────────────────────────────────

// ─── SHARED TYPES ─────────────────────────────────────────────────────────────

package rentrelay;
option go_package = "github.com/AkiBatra25/rentrelay/gen/go/rentrelay;rentrelaypb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// ─────────────────────────────────────────────────────────────────────────────
// 1. USER SERVICE
//    Manages tenant and landlord profiles, JWT auth, RBAC
// ─────────────────────────────────────────────────────────────────────────────

enum UserRole {
  ROLE_UNKNOWN  = 0;
  ROLE_TENANT   = 1;
  ROLE_LANDLORD = 2;
  ROLE_ADMIN    = 3;
}

message User {
  string   user_id      = 1;
  string   name         = 2;
  string   email        = 3;
  string   phone        = 4;
  UserRole role         = 5;
  string   aadhaar_hash = 6;   // hashed national ID for KYC
  bool     kyc_verified = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message RegisterRequest {
  string   name         = 1;
  string   email        = 2;
  string   phone        = 3;
  string   password     = 4;
  UserRole role         = 5;
  string   aadhaar_hash = 6;
}

message RegisterResponse {
  User   user  = 1;
  string token = 2;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginResponse {
  string token         = 1;
  string refresh_token = 2;
  User   user          = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message UpdateKYCRequest {
  string user_id      = 1;
  string aadhaar_hash = 2;
  bool   verified     = 3;
}

service UserService {
  rpc Register    (RegisterRequest)  returns (RegisterResponse);
  rpc Login       (LoginRequest)     returns (LoginResponse);
  rpc GetUser     (GetUserRequest)   returns (User);
  rpc UpdateKYC   (UpdateKYCRequest) returns (User);
  rpc RefreshToken(LoginResponse)    returns (LoginResponse);
}


// ─────────────────────────────────────────────────────────────────────────────
// 2. PROPERTY SERVICE  (maps to Station Service in PDF)
//    Maintains property metadata, nearby amenities, zone/city mapping
// ─────────────────────────────────────────────────────────────────────────────

enum FurnishingType {
  FURNISHING_UNKNOWN     = 0;
  UNFURNISHED            = 1;
  SEMI_FURNISHED         = 2;
  FULLY_FURNISHED        = 3;
}

message Property {
  string         property_id   = 1;
  string         landlord_id   = 2;
  string         title         = 3;
  string         address       = 4;
  string         city          = 5;
  string         zone          = 6;    // partition key for storage workers
  double         latitude      = 7;
  double         longitude     = 8;
  int32          bedrooms      = 9;
  double         rent_monthly  = 10;
  double         deposit_amt   = 11;
  FurnishingType furnishing    = 12;
  repeated string amenities    = 13;
  bool           is_available  = 14;
  google.protobuf.Timestamp available_from = 15;
  google.protobuf.Timestamp created_at     = 16;
}

message RegisterPropertyRequest {
  string         landlord_id   = 1;
  string         title         = 2;
  string         address       = 3;
  string         city          = 4;
  string         zone          = 5;
  double         latitude      = 6;
  double         longitude     = 7;
  int32          bedrooms      = 8;
  double         rent_monthly  = 9;
  double         deposit_amt   = 10;
  FurnishingType furnishing    = 11;
  repeated string amenities    = 12;
  google.protobuf.Timestamp available_from = 13;
}

message SearchPropertiesRequest {
  string city          = 1;
  string zone          = 2;
  int32  min_bedrooms  = 3;
  double max_rent      = 4;
  FurnishingType furnishing = 5;
}

message SearchPropertiesResponse {
  repeated Property properties = 1;
}

message UpdateAvailabilityRequest {
  string property_id   = 1;
  bool   is_available  = 2;
}
message GetPropertyRequest {
  string property_id = 1;
}
service PropertyService {
  rpc RegisterProperty    (RegisterPropertyRequest)  returns (Property);
  rpc GetProperty         (GetPropertyRequest)    returns (Property);     // uses metadata
  rpc SearchProperties    (SearchPropertiesRequest)  returns (SearchPropertiesResponse);
  rpc UpdateAvailability  (UpdateAvailabilityRequest)returns (Property);
  rpc ListByLandlord      (GetUserRequest)            returns (SearchPropertiesResponse);
}


// ─────────────────────────────────────────────────────────────────────────────
// 3. LANDLORD SERVICE  (maps to Driver Service in PDF)
//    Allows landlords to register properties, set terms, update availability
// ─────────────────────────────────────────────────────────────────────────────

message LeaseTerms {
  string   landlord_id        = 1;
  string   property_id        = 2;
  int32    lease_duration_mo  = 3;   // months
  int32    notice_period_days = 4;
  string   preferred_tenant   = 5;   // e.g. "family", "working professional"
  repeated string allowed_types = 6;
  double   maintenance_charge = 7;
  string   payment_due_day    = 8;   // "1" = 1st of month
}

message SetLeaseTermsRequest {
  string landlord_id       = 1;
  string property_id       = 2;
  LeaseTerms terms         = 3;
}
message GetLeaseTermsRequest {
  string landlord_id = 1;
  string property_id = 2;
}
message LandlordDashboardRequest {
  string landlord_id = 1;
}

message LandlordDashboard {
  string landlord_id             = 1;
  int32  total_properties        = 2;
  int32  active_leases           = 3;
  int32  pending_disputes        = 4;
  double total_rent_this_month   = 5;
  repeated Property properties   = 6;
}

service LandlordService {
  rpc SetLeaseTerms       (SetLeaseTermsRequest)    returns (LeaseTerms);
  rpc GetLeaseTerms       (GetLeaseTermsRequest)           returns (LeaseTerms);   // uses property_id in metadata
  rpc GetDashboard        (LandlordDashboardRequest) returns (LandlordDashboard);
  rpc RaiseDispute        (DisputeRequest)           returns (Dispute);
  rpc ConfirmVacation     (AgreementActionRequest)   returns (Agreement);
}


// ─────────────────────────────────────────────────────────────────────────────
// 4. TENANT SERVICE  (maps to Rider Service in PDF)
//    Allows tenants to search, request properties, track lease + payments
// ─────────────────────────────────────────────────────────────────────────────

message RentalRequest {
  string  request_id       = 1;
  string  tenant_id        = 2;
  string  preferred_zone   = 3;
  string  preferred_city   = 4;
  int32   bedrooms_needed  = 5;
  double  max_rent         = 6;
  FurnishingType furnishing = 7;
  google.protobuf.Timestamp move_in_date = 8;
  google.protobuf.Timestamp created_at   = 9;
}

message CreateRentalRequestReq {
  string  tenant_id        = 1;
  string  preferred_zone   = 2;
  string  preferred_city   = 3;
  int32   bedrooms_needed  = 4;
  double  max_rent         = 5;
  FurnishingType furnishing = 6;
  google.protobuf.Timestamp move_in_date = 7;
}

message TenantDashboard {
  string  tenant_id             = 1;
  string  active_agreement_id   = 2;
  double  next_rent_due         = 3;
  google.protobuf.Timestamp next_due_date = 4;
  int32   months_paid           = 5;
  int32   pending_disputes      = 6;
}

service TenantService {
  rpc CreateRentalRequest (CreateRentalRequestReq) returns (RentalRequest);
  rpc GetRentalRequest    (GetUserRequest)          returns (RentalRequest);
  rpc GetDashboard        (GetUserRequest)          returns (TenantDashboard);
  rpc InitiatePayment     (PaymentRequest)          returns (PaymentReceipt);
  rpc RaiseDispute        (DisputeRequest)          returns (Dispute);
}


// ─────────────────────────────────────────────────────────────────────────────
// 5. MATCHING SERVICE  (maps to Matching Service in PDF)
//    Matches tenant rental requests to available properties
//    THIS IS THE SERVICE THAT SCALES 1 → 5 PODS VIA K8s HPA
// ─────────────────────────────────────────────────────────────────────────────

message MatchRequest {
  string          match_request_id = 1;
  RentalRequest   rental_request   = 2;
}

message MatchCandidate {
  string   property_id    = 1;
  string   landlord_id    = 2;
  Property property       = 3;
  LeaseTerms terms        = 4;
  double   score          = 5;   // 0.0 – 1.0 match quality
  string   match_reason   = 6;
}

message MatchResponse {
  string                   match_request_id = 1;
  repeated MatchCandidate  candidates       = 2;
  google.protobuf.Timestamp matched_at      = 3;
}

// Bidirectional stream: client sends RentalRequests, server streams MatchCandidates
message MatchStreamRequest {
  string tenant_id      = 1;
  string zone           = 2;
}

message MatchStreamEvent {
  string        property_id   = 1;
  MatchCandidate candidate    = 2;
  string        event_type    = 3;  // "NEW_MATCH" | "MATCH_EXPIRED" | "PROPERTY_TAKEN"
}

service MatchingService {
  rpc FindMatches       (MatchRequest)       returns (MatchResponse);
  rpc AcceptMatch       (AcceptMatchRequest) returns (Agreement);
  // Bidirectional stream for live match updates
  rpc StreamMatches     (stream MatchStreamRequest) returns (stream MatchStreamEvent);
}

message AcceptMatchRequest {
  string tenant_id    = 1;
  string property_id  = 2;
  string landlord_id  = 3;
}


// ─────────────────────────────────────────────────────────────────────────────
// 6. AGREEMENT SERVICE  (maps to Trip Service in PDF)
//    Full rental agreement + escrow lifecycle state machine
// ─────────────────────────────────────────────────────────────────────────────

enum AgreementState {
  STATE_UNKNOWN      = 0;
  CREATED            = 1;
  SIGNED             = 2;
  ESCROW_HELD        = 3;
  ACTIVE             = 4;
  DISPUTED           = 5;
  NOTICE_PERIOD      = 6;
  TERMINATING        = 7;
  COMPLETED          = 8;
  CANCELLED          = 9;
  RESOLVED           = 10;
}

message Agreement {
  string         agreement_id    = 1;
  string         tenant_id       = 2;
  string         landlord_id     = 3;
  string         property_id     = 4;
  AgreementState state           = 5;
  double         monthly_rent    = 6;
  double         deposit_amount  = 7;
  double         deposit_held    = 8;     // amount currently in escrow
  int32          lease_months    = 9;
  int32          notice_days     = 10;
  string         document_hash   = 11;    // SHA-256 of signed PDF
  repeated string signatures     = 12;   // [tenant_sig, landlord_sig]
  google.protobuf.Timestamp start_date   = 13;
  google.protobuf.Timestamp end_date     = 14;
  google.protobuf.Timestamp created_at   = 15;
  google.protobuf.Timestamp updated_at   = 16;
  // Routing info for Proj 2 storage
  string worker_node             = 17;   // primary worker for this agreement
  int32  replica_version         = 18;   // incremented on each write
}

message CreateAgreementRequest {
  string  tenant_id       = 1;
  string  landlord_id     = 2;
  string  property_id     = 3;
  double  monthly_rent    = 4;
  double  deposit_amount  = 5;
  int32   lease_months    = 6;
  int32   notice_days     = 7;
  google.protobuf.Timestamp start_date = 8;
}

message AgreementActionRequest {
  string agreement_id = 1;
  string actor_id     = 2;   // who is performing the action
  string notes        = 3;
}

message SignAgreementRequest {
  string agreement_id   = 1;
  string signer_id      = 2;
  string signature_hash = 3;   // client-side digital signature
}

message RecordPaymentReq {
  string agreement_id = 1;
  string tenant_id    = 2;
  double amount       = 3;
  string payment_ref  = 4;
  string month_year   = 5;     // "2025-05"
}

message ReleaseEscrowRequest {
  string agreement_id     = 1;
  string authorized_by    = 2;
  double deduction_amount = 3;   // 0 if full refund
  string deduction_reason = 4;
}

service AgreementService {
  rpc CreateAgreement   (CreateAgreementRequest) returns (Agreement);
  rpc GetAgreement      (AgreementActionRequest) returns (Agreement);
  rpc SignAgreement     (SignAgreementRequest)    returns (Agreement);
  rpc HoldEscrow        (AgreementActionRequest) returns (Agreement);
  rpc StartLease        (AgreementActionRequest) returns (Agreement);
  rpc RecordPayment     (RecordPaymentReq)        returns (PaymentReceipt);
  rpc InitiateNotice    (AgreementActionRequest) returns (Agreement);
  rpc VacateProperty    (AgreementActionRequest) returns (Agreement);
  rpc ReleaseEscrow     (ReleaseEscrowRequest)   returns (Agreement);
  rpc TransitionState   (AgreementActionRequest) returns (Agreement);
  // Stream agreement events to subscribers (landlord/tenant dashboards)
  rpc StreamAgreementEvents (AgreementActionRequest) returns (stream AgreementEvent);
}

message AgreementEvent {
  string         agreement_id = 1;
  AgreementState old_state    = 2;
  AgreementState new_state    = 3;
  string         actor_id     = 4;
  string         notes        = 5;
  google.protobuf.Timestamp occurred_at = 6;
}


// ─────────────────────────────────────────────────────────────────────────────
// 7. DOCUMENT SERVICE  (maps to Location Service in PDF)
//    Signed document hashing, storage pointer, verification
// ─────────────────────────────────────────────────────────────────────────────

message Document {
  string   document_id    = 1;
  string   agreement_id   = 2;
  string   doc_type       = 3;   // "AGREEMENT" | "ID_PROOF" | "DISPUTE_EVIDENCE"
  string   storage_key    = 4;   // path in object store
  string   sha256_hash    = 5;
  int64    size_bytes      = 6;
  string   uploaded_by    = 7;
  bool     locked         = 8;   // true when agreement in DISPUTED state
  google.protobuf.Timestamp uploaded_at = 9;
}

message UploadDocumentRequest {
  string agreement_id = 1;
  string doc_type     = 2;
  string uploaded_by  = 3;
  bytes  content      = 4;
  string filename     = 5;
}

message VerifyDocumentRequest {
  string document_id  = 1;
  string sha256_hash  = 2;   // client provides hash to verify
}

message VerifyDocumentResponse {
  bool   is_valid     = 1;
  string document_id  = 2;
  string stored_hash  = 3;
}

message LockDocumentsRequest {
  string agreement_id = 1;
}

service DocumentService {
  rpc UploadDocument   (UploadDocumentRequest)  returns (Document);
  rpc GetDocument      (AgreementActionRequest) returns (Document);
  rpc VerifyDocument   (VerifyDocumentRequest)  returns (VerifyDocumentResponse);
  rpc LockDocuments    (LockDocumentsRequest)   returns (google.protobuf.Empty);
  rpc UnlockDocuments  (LockDocumentsRequest)   returns (google.protobuf.Empty);
  rpc ListByAgreement  (AgreementActionRequest) returns (DocumentList);
}

message DocumentList {
  repeated Document documents = 1;
}


// ─────────────────────────────────────────────────────────────────────────────
// 8. NOTIFICATION SERVICE  (maps to Notification Service in PDF)
//    SMS, email, in-app push on every agreement state change
// ─────────────────────────────────────────────────────────────────────────────

enum NotificationChannel {
  CHANNEL_UNKNOWN = 0;
  SMS             = 1;
  EMAIL           = 2;
  PUSH            = 3;
  WHATSAPP        = 4;
}

enum NotificationEvent {
  NOTIFICATION_EVENT_UNKNOWN          = 0;
  NOTIFICATION_AGREEMENT_CREATED      = 1;
  NOTIFICATION_AGREEMENT_SIGNED       = 2;
  NOTIFICATION_ESCROW_HELD            = 3;
  NOTIFICATION_LEASE_STARTED          = 4;
  NOTIFICATION_RENT_DUE_REMINDER      = 5;
  NOTIFICATION_RENT_RECEIVED          = 6;
  NOTIFICATION_RENT_OVERDUE           = 7;
  NOTIFICATION_DISPUTE_RAISED         = 8;
  NOTIFICATION_DISPUTE_RESOLVED       = 9;
  NOTIFICATION_NOTICE_INITIATED       = 10;
  NOTIFICATION_LEASE_EXPIRING         = 11;
  NOTIFICATION_ESCROW_RELEASED        = 12;
}

message Notification {
  string              notification_id = 1;
  string              user_id         = 2;
  string              agreement_id    = 3;
  NotificationEvent   event           = 4;
  NotificationChannel channel         = 5;
  string              message         = 6;
  bool                delivered       = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp delivered_at = 9;
}

message SendNotificationRequest {
  string              user_id       = 1;
  string              agreement_id  = 2;
  NotificationEvent   event         = 3;
  repeated NotificationChannel channels = 4;
  map<string, string> template_vars = 5;   // e.g. {"amount": "15000", "month": "May"}
}

message BroadcastRequest {
  repeated string     user_ids      = 1;
  string              agreement_id  = 2;
  NotificationEvent   event         = 3;
  repeated NotificationChannel channels = 4;
  map<string, string> template_vars = 5;
}

message NotificationList {
  repeated Notification notifications = 1;
  int32                 total         = 2;
}

service NotificationService {
  rpc Send          (SendNotificationRequest) returns (Notification);
  rpc Broadcast     (BroadcastRequest)        returns (google.protobuf.Empty);
  rpc GetHistory    (GetUserRequest)           returns (NotificationList);
  // Server-side stream: push real-time events to connected clients
  rpc Subscribe     (GetUserRequest)           returns (stream Notification);
}


// ─────────────────────────────────────────────────────────────────────────────
// SHARED PAYMENT + DISPUTE TYPES (used across services)
// ─────────────────────────────────────────────────────────────────────────────

message PaymentRequest {
  string agreement_id = 1;
  string payer_id     = 2;
  double amount       = 3;
  string payment_type = 4;   // "RENT" | "DEPOSIT" | "MAINTENANCE"
  string upi_ref      = 5;
}

message PaymentReceipt {
  string   receipt_id     = 1;
  string   agreement_id   = 2;
  string   payer_id       = 3;
  double   amount         = 4;
  string   payment_type   = 5;
  string   status         = 6;   // "SUCCESS" | "FAILED" | "PENDING"
  string   month_year     = 7;
  google.protobuf.Timestamp paid_at = 8;
}

message DisputeRequest {
  string agreement_id  = 1;
  string raised_by     = 2;   // user_id
  string reason        = 3;
  string description   = 4;
  repeated string evidence_doc_ids = 5;
}

message Dispute {
  string         dispute_id    = 1;
  string         agreement_id  = 2;
  string         raised_by     = 3;
  string         status        = 4;   // "OPEN" | "UNDER_REVIEW" | "RESOLVED"
  string         reason        = 5;
  string         description   = 6;
  string         resolution    = 7;
  double         escrow_deducted = 8;
  repeated string evidence_doc_ids = 9;
  google.protobuf.Timestamp raised_at    = 10;
  google.protobuf.Timestamp resolved_at  = 11;
}


// ─────────────────────────────────────────────────────────────────────────────
// 9. STORAGE CONTROLLER SERVICE  (Proj 2 — Controller Node)
//    Maintains partition table, routes client → worker
// ─────────────────────────────────────────────────────────────────────────────

message PartitionInfo {
  string worker_id      = 1;
  string worker_address = 2;   // "storage-worker-1:50060"
  int32  shard_start    = 3;   // consistent hash range start
  int32  shard_end      = 4;
  bool   is_alive       = 5;
  google.protobuf.Timestamp last_heartbeat = 6;
}

message GetWorkerRequest {
  string key = 1;   // e.g. agreement_id
}

message GetWorkerResponse {
  PartitionInfo primary  = 1;
  repeated PartitionInfo replicas = 2;
}

message HeartbeatRequest {
  string worker_id      = 1;
  int64  stored_keys    = 2;
  double disk_usage_pct = 3;
}

message RebalanceEvent {
  string from_worker  = 1;
  string to_worker    = 2;
  repeated string keys = 3;
  string reason       = 4;   // "WORKER_FAILURE" | "LOAD_BALANCE"
}

service StorageController {
  rpc GetWorkerForKey  (GetWorkerRequest)  returns (GetWorkerResponse);
  rpc GetAllPartitions (google.protobuf.Empty) returns (PartitionTable);
  rpc Heartbeat        (HeartbeatRequest)  returns (google.protobuf.Empty);
  rpc RegisterWorker   (PartitionInfo)     returns (google.protobuf.Empty);
  // Server streams rebalance commands to workers
  rpc WatchRebalance   (HeartbeatRequest)  returns (stream RebalanceEvent);
}

message PartitionTable {
  repeated PartitionInfo partitions = 1;
  int64    version = 2;
}


// ─────────────────────────────────────────────────────────────────────────────
// 10. STORAGE WORKER SERVICE  (Proj 2 — Worker Nodes, 4 instances)
//     Stores K/V data, accepts replicated writes, serves reads
// ─────────────────────────────────────────────────────────────────────────────

message KVPutRequest {
  string key            = 1;
  bytes  value          = 2;   // serialized protobuf bytes
  int32  replica_version = 3;
  bool   is_primary     = 4;
}

message KVPutResponse {
  bool   success        = 1;
  string worker_id      = 2;
  int32  replica_version = 3;
}

message KVGetRequest {
  string key = 1;
}

message KVGetResponse {
  string key            = 1;
  bytes  value          = 2;
  int32  replica_version = 3;
  bool   found          = 4;
}

message KeyRangeRequest {
  int32 shard_start = 1;
  int32 shard_end   = 2;
}

message KeyList {
  repeated string keys = 1;
}

service StorageWorker {
  rpc Put        (KVPutRequest)    returns (KVPutResponse);
  rpc Get        (KVGetRequest)    returns (KVGetResponse);
  rpc Delete     (KVGetRequest)    returns (google.protobuf.Empty);
  rpc ListKeys   (KeyRangeRequest) returns (KeyList);
  // Used during rebalancing: transfer keys to another worker
  rpc TransferKeys (stream KVPutRequest) returns (google.protobuf.Empty);
}
