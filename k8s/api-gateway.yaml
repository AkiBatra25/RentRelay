apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rentrelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: rentrelay/api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: USER_SERVICE_ADDR
              value: "user-service:50051"
            - name: PROPERTY_SERVICE_ADDR
              value: "property-service:50052"
            - name: AGREEMENT_SERVICE_ADDR
              value: "agreement-service:50055"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rentrelay
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: NodePort
