apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: rentrelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
    spec:
      containers:
        - name: tenant-service
          image: rentrelay/tenant-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50054
          envFrom:
            - configMapRef:
                name: rentrelay-config
            - secretRef:
                name: rentrelay-secrets
          env:
            - name: GRPC_PORT
              value: "50054"

---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: rentrelay
spec:
  selector:
    app: tenant-service
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
