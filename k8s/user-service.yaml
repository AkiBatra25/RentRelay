apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: rentrelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: rentrelay/user-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
          envFrom:
            - configMapRef:
                name: rentrelay-config
            - secretRef:
                name: rentrelay-secrets
          env:
            - name: GRPC_PORT
              value: "50051"

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: rentrelay
spec:
  selector:
    app: user-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
