---
# ─────────────────────────────────────────────────────────────────────────────
# API GATEWAY  (REST → gRPC translation layer)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: rentrelay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: rentrelay/api-gateway:latest
          ports:
            - containerPort: 8080    # REST API
          envFrom:
            - configMapRef:
                name: rentrelay-config
            - secretRef:
                name: rentrelay-secrets
          env:
            - name: HTTP_PORT
              value: "8080"
            - name: USER_SERVICE_ADDR
              value: "user-service:50051"
            - name: PROPERTY_SERVICE_ADDR
              value: "property-service:50052"
            - name: LANDLORD_SERVICE_ADDR
              value: "landlord-service:50053"
            - name: TENANT_SERVICE_ADDR
              value: "tenant-service:50054"
            - name: AGREEMENT_SERVICE_ADDR
              value: "agreement-service:50055"
            - name: MATCHING_SERVICE_ADDR
              value: "matching-service:50056"
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 1,    memory: 512Mi }
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: rentrelay
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
