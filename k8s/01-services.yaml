---
# ─────────────────────────────────────────────────────────────────────────────
# MATCHING SERVICE
# *** THIS IS THE SERVICE THAT SCALES 1 → 5 via HPA (PDF requirement) ***
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service
  namespace: rentrelay
  labels:
    app: matching-service
spec:
  replicas: 1          # starts at 1, HPA scales to 5
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8080"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: matching-service
          image: rentrelay/matching-service:latest
          ports:
            - containerPort: 50056    # gRPC
            - containerPort: 8080     # Prometheus metrics
          envFrom:
            - configMapRef:
                name: rentrelay-config
            - secretRef:
                name: rentrelay-secrets
          env:
            - name: GRPC_PORT
              value: "50056"
            - name: LANDLORD_SERVICE_ADDR
              value: "landlord-service:50053"
            - name: TENANT_SERVICE_ADDR
              value: "tenant-service:50054"
            - name: AGREEMENT_SERVICE_ADDR
              value: "agreement-service:50055"
            - name: NOTIFICATION_SERVICE_ADDR
              value: "notification-service:50057"
            - name: PROPERTY_SERVICE_ADDR
              value: "property-service:50052"
          resources:
            requests: { cpu: 200m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
          livenessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 50056
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: matching-service
  namespace: rentrelay
spec:
  selector:
    app: matching-service
  ports:
    - name: grpc
      port: 50056
      targetPort: 50056
    - name: metrics
      port: 8080
      targetPort: 8080

---
# HPA for Matching Service: scales 1 → 5 pods on CPU or custom queue metric
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matching-service-hpa
  namespace: rentrelay
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: matching-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: matching_queue_depth   # custom Prometheus metric
        target:
          type: AverageValue
          averageValue: "50"           # scale out when queue > 50 per pod
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

