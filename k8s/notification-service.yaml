apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: rentrelay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: rentrelay/notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50057
          envFrom:
            - configMapRef:
                name: rentrelay-config
            - secretRef:
                name: rentrelay-secrets
          env:
            - name: GRPC_PORT
              value: "50057"

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: rentrelay
spec:
  selector:
    app: notification-service
  ports:
    - name: grpc
      port: 50057
      targetPort: 50057
