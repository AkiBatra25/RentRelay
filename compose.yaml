services:
  mongodb:
    image: mongo:7.0
    container_name: rentrelay-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: rentrelay
      MONGO_INITDB_ROOT_PASSWORD: rentrelay
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user-service
    container_name: rentrelay-user-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50051
    ports:
      - "50051:50051"

  property-service:
    build:
      context: .
      dockerfile: Dockerfile.property-service
    container_name: rentrelay-property-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50052
    ports:
      - "50052:50052"

  landlord-service:
    build:
      context: .
      dockerfile: Dockerfile.landlord-service
    container_name: rentrelay-landlord-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      property-service:
        condition: service_started
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      PROPERTY_SERVICE_ADDR: property-service:50052
      GRPC_PORT: 50053
    ports:
      - "50053:50053"

  tenant-service:
    build:
      context: .
      dockerfile: Dockerfile.tenant-service
    container_name: rentrelay-tenant-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50054
    ports:
      - "50054:50054"

  agreement-service:
    build:
      context: .
      dockerfile: Dockerfile.agreement-service
    container_name: rentrelay-agreement-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50055
    ports:
      - "50055:50055"

  matching-service:
    build:
      context: .
      dockerfile: Dockerfile.matching-service
    container_name: rentrelay-matching-service
    restart: unless-stopped
    depends_on:
      property-service:
        condition: service_started
      landlord-service:
        condition: service_started
      tenant-service:
        condition: service_started
      agreement-service:
        condition: service_started
    environment:
      PROPERTY_SERVICE_ADDR: property-service:50052
      LANDLORD_SERVICE_ADDR: landlord-service:50053
      AGREEMENT_SERVICE_ADDR: agreement-service:50055
      GRPC_PORT: 50056
    ports:
      - "50056:50056"

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile.notification-service
    container_name: rentrelay-notification-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50057
    ports:
      - "50057:50057"

  document-service:
    build:
      context: .
      dockerfile: Dockerfile.document-service
    container_name: rentrelay-document-service
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://rentrelay:rentrelay@mongodb:27017/rentrelay?authSource=admin
      MONGO_DATABASE: rentrelay
      GRPC_PORT: 50058
    ports:
      - "50058:50058"

volumes:
  mongodb-data:
