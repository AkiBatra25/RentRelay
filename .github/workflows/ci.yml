name: CI — Test, Build, Push

# This robot runs every time you push to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Run all tests first
  # If tests fail, we stop here and don't build anything
  test:
    name: Run all tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod tidy

      - name: Run all tests
        run: go test -buildvcs=false ./...

  # Job 2: Build Docker images and push to Docker Hub
  # Only runs if Job 1 (tests) passed
  # Only runs on push to main (not on pull requests)
  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-user-service:latest

      - name: Build and push property-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.property-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-property-service:latest

      - name: Build and push landlord-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.landlord-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-landlord-service:latest

      - name: Build and push tenant-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.tenant-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-tenant-service:latest

      - name: Build and push matching-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.matching-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-matching-service:latest

      - name: Build and push agreement-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agreement-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-agreement-service:latest

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-notification-service:latest

      - name: Build and push document-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.document-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-document-service:latest

      - name: Build and push storage-controller
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.storage-controller
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-storage-controller:latest

      - name: Build and push storage-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.storage-worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-storage-worker:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/rentrelay-api-gateway:latest
